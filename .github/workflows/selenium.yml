name: Selenium Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

jobs:
  UI-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install React dependencies
        working-directory: ./react-app
        run: npm ci

      - name: Start React app
        working-directory: ./react-app
        run: npm start &

      - name: Wait for React app
        run: npx wait-on http://localhost:3000

      - name: Run Selenium TestNG tests
        working-directory: ./selenium-tests
        run: mvn clean test

  docker:
    needs: UI-tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get application version
        id: version
        working-directory: ./react-app
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./react-app
          file: ./react-app/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}

          tags: |
            dwoneill18/selenium-webapp:latest
            dwoneill18/selenium-webapp:${{ github.sha }}
            dwoneill18/selenium-webapp:${{ steps.version.outputs.VERSION }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: true
          sbom: true
